<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#0E1A3A"/>
      <stop offset="1" stop-color="#0A2A2A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feOffset dx="0" dy="18" result="off"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="1600" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="230" r="190" fill="#22C55E" opacity="0.12"/>
  <circle cx="260" cy="1320" r="260" fill="#06B6D4" opacity="0.10"/>
  <circle cx="240" cy="320" r="120" fill="#F59E0B" opacity="0.10"/>

  <!-- Main card -->
  <rect x="96" y="140" width="1008" height="1240" rx="42" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14" filter="url(#softShadow)"/>

  <!-- Logo-ish mark -->
  <g transform="translate(156,220)">
    <rect x="0" y="0" width="84" height="84" rx="22" fill="#22C55E" opacity="0.90"/>
    <path d="M22 52 C30 28, 56 26, 62 40 C66 50, 56 62, 42 60 C30 58, 26 66, 22 70 Z" fill="#0B1020" opacity="0.92"/>
  </g>

  <!-- Headline -->
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" fill="#FFFFFF">
    <text x="156" y="360" font-size="64" font-weight="700">OpenClaw Litepack</text>
    <text x="156" y="430" font-size="36" opacity="0.90">Windows 便携版 · 首发可用</text>
  </g>

  <!-- Big promise -->
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" fill="#FFFFFF">
    <text x="156" y="560" font-size="54" font-weight="700">解压即用</text>
    <text x="156" y="630" font-size="54" font-weight="700">双击启动</text>
    <text x="156" y="700" font-size="54" font-weight="700">不折腾环境</text>
  </g>

  <!-- Bullets -->
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" fill="#E5E7EB">
    <text x="156" y="820" font-size="28">• 适合 U 盘随身带走 / 换机即用</text>
    <text x="156" y="870" font-size="28">• 配置放在 .env，源码不硬编码</text>
    <text x="156" y="920" font-size="28">• 文档 + 打包脚本开源，可复现</text>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(156,1140)">
    <rect x="0" y="0" width="888" height="170" rx="28" fill="#0B1020" opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" fill="#FFFFFF">
      <text x="28" y="62" font-size="26" opacity="0.92">下载：cloud.189.cn（访问码：xo2r）</text>
      <text x="28" y="106" font-size="26" opacity="0.92">开源：github.com/cnwpdb/openclaw-litepack</text>
    </g>
    <!-- Fake QR placeholder -->
    <g transform="translate(740,28)">
      <rect x="0" y="0" width="114" height="114" rx="14" fill="#FFFFFF" opacity="0.18"/>
      <rect x="18" y="18" width="26" height="26" fill="#FFFFFF" opacity="0.32"/>
      <rect x="70" y="18" width="26" height="26" fill="#FFFFFF" opacity="0.32"/>
      <rect x="18" y="70" width="26" height="26" fill="#FFFFFF" opacity="0.32"/>
      <rect x="52" y="52" width="10" height="10" fill="#FFFFFF" opacity="0.32"/>
      <rect x="52" y="72" width="10" height="10" fill="#FFFFFF" opacity="0.32"/>
      <rect x="72" y="52" width="10" height="10" fill="#FFFFFF" opacity="0.32"/>
    </g>
  </g>

  <!-- Footer -->
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif" fill="#CBD5E1" opacity="0.85">
    <text x="96" y="1540" font-size="22">提示：封面图可直接用此 SVG（打开后导出/截图成 PNG 即可）。</text>
  </g>
</svg>
